<!-- CHS VendorPrint v2 — Dashboard -->
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;margin:0;background:#f3f4f6;color:#111827}
.vp-wrap{max-width:800px;margin:0 auto;padding:40px 20px}
.logo{font-size:32px;font-weight:800;color:#0b2a5c;text-align:center;margin-bottom:40px}
.tagline{text-align:center;color:#6b7280;margin-top:-30px;margin-bottom:50px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.card{background:#fff;border:2px solid #e5e7eb;border-radius:16px;padding:30px;text-decoration:none;color:inherit;transition:all .2s}
.card:hover{border-color:#0b2a5c;box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px)}
.card-icon{font-size:40px;margin-bottom:16px}
.card h2{margin:0 0 8px;font-size:20px}
.card p{color:#6b7280;margin:0;font-size:14px}
</style>

<div class="vp-wrap">
<div class="logo">CHS VendorPrint</div>
<div class="tagline">v2.0 — Inventory & Orders</div>

<div class="cards">
<a href="inventory.html" class="card">
<div class="card-icon">📦</div>
<h2>Inventory</h2>
<p>View stock levels, edit quantities, and get low-stock alerts.</p>
</a>

<a href="orders.html" class="card">
<div class="card-icon">📋</div>
<h2>Orders</h2>
<p>Track orders through the production pipeline.</p>
</a>
</div>
</div>
