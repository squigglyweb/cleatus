<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Campaign | The Local NearBuy</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .header p {
            opacity: 0.8;
            font-size: 14px;
        }
        .content {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a1a2e;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #d62839;
        }
        .note {
            background: #f8f9fa;
            border-left: 4px solid #1a1a2e;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        .note strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Request a Campaign</h1>
            <p>Get started with affordable local advertising</p>
        </div>
        <div class="content">
            <div class="note">
                <strong>How it works:</strong> Fill out this form and we'll be in touch within 24 hours to discuss your campaign options, pricing, and get you on the schedule.
            </div>
            
            <form id="campaignForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="businessName">Business Name *</label>
                        <input type="text" id="businessName" name="businessName" required>
                    </div>
                    <div class="form-group">
                        <label for="contactName">Your Name *</label>
                        <input type="text" id="contactName" name="contactName" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="campaignType">What kind of campaign?</label>
                    <select id="campaignType" name="campaignType">
                        <option value="">Select an option...</option>
                        <option value="postcard">Postcard Mailing (EDDM)</option>
                        <option value="directory">Directory Listing</option>
                        <option value="newsletter">Newsletter Sponsor</option>
                        <option value="combo">Combo Package</option>
                        <option value="not-sure">Not sure yet - need info</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Tell us about your business and goals</label>
                    <textarea id="message" name="message" placeholder="What do you want to promote? Any special offers? What's your target area?"></textarea>
                </div>
                
                <button type="submit" class="btn">Submit Request</button>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('campaignForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('.btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Submitting...';
            submitBtn.disabled = true;
            
            const formData = new FormData(this);
            
            try {
                const response = await fetch('submit-campaign.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    alert('Thanks! We\'ll be in touch within 24 hours.');
                    this.reset();
                } else {
                    alert('Something went wrong. Please try again or email us directly.');
                }
            } catch (error) {
                console.error('Submission error:', error);
                alert('Error submitting form. Please try again.');
            }
            
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        });
    </script>
</body>
</html>
