<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Local NearBuy - Points Tracker (Google Sheets Ready)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #faf8f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #d32f2f; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 20px; }
        
        /* TABS */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab { 
            padding: 12px 24px; background: white; border: 1px solid #ddd; 
            cursor: pointer; border-radius: 5px 5px 0 0; font-weight: 600;
        }
        .tab.active { background: #d32f2f; color: white; border-color: #d32f2f; }
        
        /* CONTENT */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* TABLE */
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #d32f2f; color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background: #fafafa; }
        
        /* FORMS */
        .form-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        button { 
            padding: 10px 20px; background: #d32f2f; color: white; border: none; 
            border-radius: 5px; cursor: pointer; font-weight: 600;
        }
        button:hover { background: #b71c1c; }
        
        .btn-secondary { background: #333; }
        .btn-export { background: #2e7d32; }
        
        /* STATS */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; border: 2px solid #d32f2f; text-align: center; }
        .stat-card .num { font-size: 36px; font-weight: 900; color: #d32f2f; }
        .stat-card .label { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Local NearBuy - Points Tracker</h1>
        <p class="subtitle">Data exports to CSV for Google Sheets import</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="num" id="totalUsers">0</div>
                <div class="label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="num" id="totalPoints">0</div>
                <div class="label">Points In Circulation</div>
            </div>
            <div class="stat-card">
                <div class="num" id="totalRedeemed">0</div>
                <div class="label">Points Redeemed</div>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showTab('users')">Users</div>
            <div class="tab" onclick="showTab('activity')">Activity Log</div>
            <div class="tab" onclick="showTab('rewards')">Rewards</div>
        </div>
        
        <!-- USERS TAB -->
        <div id="users" class="tab-content active">
            <div class="form-row">
                <input type="text" id="userName" placeholder="Name">
                <input type="email" id="userEmail" placeholder="Email">
                <input type="number" id="userPoints" placeholder="Points">
                <button onclick="addUser()">Add User</button>
                <button class="btn-export" onclick="exportCSV('users')">Export CSV</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Points Balance</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
        
        <!-- ACTIVITY TAB -->
        <div id="activity" class="tab-content">
            <div class="form-row">
                <select id="activityUser">
                    <option value="">Select User</option>
                </select>
                <select id="activityType">
                    <option value="earn">Earn Points</option>
                    <option value="redeem">Redeem Points</option>
                </select>
                <input type="number" id="activityPoints" placeholder="Points">
                <input type="text" id="activityNote" placeholder="Note">
                <button onclick="addActivity()">Log Activity</button>
                <button class="btn-export" onclick="exportCSV('activity')">Export CSV</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Points</th>
                        <th>Note</th>
                    </tr>
                </thead>
                <tbody id="activityTable"></tbody>
            </table>
        </div>
        
        <!-- REWARDS TAB -->
        <div id="rewards" class="tab-content">
            <div class="form-row">
                <input type="text" id="rewardName" placeholder="Reward Name">
                <input type="number" id="rewardCost" placeholder="Points Cost">
                <button onclick="addReward()">Add Reward</button>
                <button class="btn-export" onclick="exportCSV('rewards')">Export CSV</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Reward</th>
                        <th>Points Cost</th>
                        <th>Times Redeemed</th>
                    </tr>
                </thead>
                <tbody id="rewardsTable"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        // DATA STORE
        let users = [
            {id: 1, name: 'Bryan Somers', email: 'bryan@example.com', points: 150, joined: '2026-04-15'},
            {id: 2, name: 'Sarah M.', email: 'sarah@example.com', points: 75, joined: '2026-04-16'},
            {id: 3, name: 'Mike T.', email: 'mike@example.com', points: 200, joined: '2026-04-17'}
        ];
        
        let activity = [
            {date: '2026-04-15', user: 'Bryan Somers', type: 'earn', points: 100, note: 'Recommended business'},
            {date: '2026-04-16', user: 'Sarah M.', type: 'earn', points: 50, note: 'Wrote review'},
            {date: '2026-04-17', user: 'Mike T.', type: 'redeem', points: 50, note: '1 Meal for kid'},
            {date: '2026-04-18', user: 'Bryan Somers', type: 'earn', points: 50, note: 'Shared post'}
        ];
        
        let rewards = [
            {name: '1 Meal for child', cost: 30, redeemed: 5},
            {name: '5 Meals for kids', cost: 150, redeemed: 2},
            {name: '$5 Merch Credit', cost: 500, redeemed: 1},
            {name: '$10 Merch Credit', cost: 1000, redeemed: 0}
        ];
        
        let nextUserId = 4;
        
        // RENDER
        function render() {
            // Users
            document.getElementById('usersTable').innerHTML = users.map(u => 
                '<tr><td>' + u.id + '</td><td>' + u.name + '</td><td>' + u.email + '</td><td>' + u.points + '</td><td>' + u.joined + '</td><td><button onclick="deleteUser(' + u.id + ')">Delete</button></td></tr>'
            ).join('');
            
            // Activity
            document.getElementById('activityTable').innerHTML = activity.map(a => 
                '<tr><td>' + a.date + '</td><td>' + a.user + '</td><td>' + a.type + '</td><td>' + (a.type === 'redeem' ? '-' : '+') + a.points + '</td><td>' + a.note + '</td></tr>'
            ).join('');
            
            // Rewards
            document.getElementById('rewardsTable').innerHTML = rewards.map(r => 
                '<tr><td>' + r.name + '</td><td>' + r.cost + ' pts</td><td>' + r.redeemed + '</td></tr>'
            ).join('');
            
            // User dropdown
            document.getElementById('activityUser').innerHTML = '<option value="">Select User</option>' + 
                users.map(u => '<option value="' + u.name + '">' + u.name + '</option>').join('');
            
            // Stats
            document.getElementById('totalUsers').textContent = users.length;
            const totalIn = activity.filter(a => a.type === 'earn').reduce((sum, a) => sum + a.points, 0);
            const totalOut = activity.filter(a => a.type === 'redeem').reduce((sum, a) => sum + a.points, 0);
            document.getElementById('totalPoints').textContent = totalIn;
            document.getElementById('totalRedeemed').textContent = totalOut;
        }
        
        // ACTIONS
        function addUser() {
            const name = document.getElementById('userName').value;
            const email = document.getElementById('userEmail').value;
            const points = parseInt(document.getElementById('userPoints').value) || 0;
            
            if (name && email) {
                users.push({id: nextUserId++, name, email, points, joined: new Date().toISOString().split('T')[0]});
                document.getElementById('userName').value = '';
                document.getElementById('userEmail').value = '';
                document.getElementById('userPoints').value = '';
                render();
            }
        }
        
        function deleteUser(id) {
            users = users.filter(u => u.id !== id);
            render();
        }
        
        function addActivity() {
            const user = document.getElementById('activityUser').value;
            const type = document.getElementById('activityType').value;
            const points = parseInt(document.getElementById('activityPoints').value);
            const note = document.getElementById('activityNote').value;
            
            if (user && points) {
                activity.unshift({
                    date: new Date().toISOString().split('T')[0],
                    user, type, points, note
                });
                
                // Update user balance
                const u = users.find(u => u.name === user);
                if (u) {
                    u.points += (type === 'earn' ? points : -points);
                }
                
                render();
            }
        }
        
        function addReward() {
            const name = document.getElementById('rewardName').value;
            const cost = parseInt(document.getElementById('rewardCost').value);
            
            if (name && cost) {
                rewards.push({name, cost, redeemed: 0});
                document.getElementById('rewardName').value = '';
                document.getElementById('rewardCost').value = '';
                render();
            }
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab')[tab === 'users' ? 0 : tab === 'activity' ? 1 : 2].classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function exportCSV(tab) {
            let csv = '';
            if (tab === 'users') {
                csv = 'ID,Name,Email,Points Balance,Joined\n';
                csv += users.map(u => u.id + ',' + u.name + ',' + u.email + ',' + u.points + ',' + u.joined).join('\n');
            } else if (tab === 'activity') {
                csv = 'Date,User,Type,Points,Note\n';
                csv += activity.map(a => a.date + ',' + a.user + ',' + a.type + ',' + a.points + ',' + a.note).join('\n');
            } else {
                csv = 'Reward,Points Cost,Times Redeemed\n';
                csv += rewards.map(r => r.name + ',' + r.cost + ',' + r.redeemed).join('\n');
            }
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'nearbuy-points-' + tab + '.csv';
            a.click();
        }
        
        render();
    </script>
</body>
</html>
