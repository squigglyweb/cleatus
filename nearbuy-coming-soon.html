<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local NearBuy — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { --red: #d32f2f; --black: #1a1a1a; }
        
        body { font-family: 'Inter', sans-serif; background: var(--black); }
        
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        .container { position: relative; z-index: 1; min-height: 100vh; padding: 30px; }
        
        /* MOSAIC LAYOUT - Like Postcard */
        .mosaic {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .m-box {
            background: white;
            border: 2px solid var(--black);
            border-radius: 6px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
        }
        
        .m-box .icon { font-size: 14px; }
        .m-box h4 { font-size: 8px; font-weight: 800; text-transform: uppercase; margin-top: 4px; }
        .m-box p { font-size: 7px; color: #666; display: none; margin-top: 3px; }
        .m-box:hover p { display: block; }
        
        /* Mosaic sizes */
        .m-box.s1 { grid-column: span 1; } /* small */
        .m-box.s2 { grid-column: span 2; } /* medium */
        .m-box.s3 { grid-column: span 3; } /* large */
        .m-box.s4 { grid-column: span 4; } /* full */
        
        .m-box.highlight { border-color: var(--red); background: rgba(211,47,47,0.05); }
        .m-box.highlight h4 { color: var(--red); }
        
        /* Email signup bottom left */
        .signup-box {
            position: absolute;
            bottom: 60px;
            left: 30px;
            background: rgba(255,255,255,0.97);
            padding: 18px 22px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            max-width: 280px;
        }
        
        .signup-box h3 { font-size: 13px; font-weight: 900; color: var(--red); margin-bottom: 10px; text-transform: uppercase; }
        .signup-box form { display: flex; flex-direction: column; gap: 6px; }
        .signup-box input { padding: 8px 10px; border: 2px solid #ddd; border-radius: 4px; font-size: 12px; }
        .signup-box button { background: var(--red); color: white; border: none; padding: 8px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 12px; }
        
        footer { position: absolute; bottom: 20px; left: 30px; }
        footer .logo { font-size: 14px; font-weight: 900; color: var(--red); }
        footer p { color: rgba(255,255,255,0.4); font-size: 8px; margin-top: 2px; }
        
        @media (max-width: 768px) {
            .mosaic { max-width: 100%; }
            .signup-box { position: relative; bottom: auto; left: auto; margin: 20px 0; max-width: 100%; }
            footer { position: relative; bottom: auto; left: auto; margin-top: 30px; }
        }
    </style>
</head>
<body>
    <img src="town-illustration.png" class="bg-image" alt="">
    
    <div class="container">
        <!-- MOSAIC BOXES - Like Postcard Ad Spaces -->
        <div class="mosaic">
            <div class="m-box s1"><div class="icon">📻</div><h4>TLN Radio</h4><p>Stream jingles</p></div>
            <div class="m-box s1"><div class="icon">💡</div><h4>Recommend</h4><p>Suggest a biz</p></div>
            <div class="m-box s1"><div class="icon">☕</div><h4>Pillars</h4><p>8 categories</p></div>
            <div class="m-box s1"><div class="icon">🗺️</div><h4>Coverage</h4><p>Our area</p></div>
            
            <div class="m-box s2 highlight"><div class="icon">🍽️</div><h4>Our Mission</h4><p>Shop local. Feed families.</p></div>
            <div class="m-box s1"><div class="icon">📣</div><h4>Biz Ads</h4><p>Advertise</p></div>
            <div class="m-box s1"><div class="icon">📱</div><h4>Directory</h4><p>Browse all</p></div>
        </div>
        
        <!-- Email Signup Bottom Left -->
        <div class="signup-box">
            <h3>Want Local Deals?</h3>
            <form onsubmit="alert('Thanks!'); return false;">
                <input type="email" placeholder="Your email" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <footer>
            <div class="logo">The Local NearBuy</div>
            <p>Shop local. Feed families.</p>
        </footer>
    </div>
</body>
</html>
