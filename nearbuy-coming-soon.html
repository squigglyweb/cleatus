<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local NearBuy — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #d32f2f;
            --black: #1a1a1a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
        }
        
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 30px;
        }
        
        /* 6 BOXES - DIFFERENT SIZES, POSITIONED ON IMAGE */
        .boxes-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 500px;
            margin: 0 auto 30px;
        }
        
        .box {
            background: white;
            border: 2px solid var(--black);
            border-radius: 6px;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .box:hover {
            transform: scale(1.05);
        }
        
        .box .icon {
            font-size: 16px;
        }
        
        .box h4 {
            font-size: 8px;
            font-weight: 800;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        
        .box p {
            font-size: 7px;
            color: #666;
            display: none;
            margin-top: 3px;
        }
        
        .box:hover p {
            display: block;
        }
        
        /* Different sizes - like postcard layout */
        .box.small { grid-column: span 1; }
        .box.medium { grid-column: span 1; }
        .box.large { grid-column: span 2; }
        
        .box.highlight {
            border-color: var(--red);
            background: rgba(211,47,47,0.05);
        }
        
        .box.highlight h4 {
            color: var(--red);
        }
        
        /* EMAIL SIGNUP - BOTTOM LEFT */
        .signup-box {
            position: absolute;
            bottom: 60px;
            left: 30px;
            background: rgba(255,255,255,0.97);
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            max-width: 320px;
        }
        
        .signup-box h3 {
            font-size: 16px;
            font-weight: 900;
            color: var(--red);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        .signup-box form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .signup-box input {
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
        }
        
        .signup-box button {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
        }
        
        footer {
            position: absolute;
            bottom: 20px;
            left: 30px;
        }
        
        footer .logo {
            font-size: 18px;
            font-weight: 900;
            color: var(--red);
        }
        
        footer p {
            color: rgba(255,255,255,0.4);
            font-size: 10px;
            margin-top: 3px;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .bg-image {
                position: fixed;
            }
            
            .container {
                min-height: auto;
                padding: 20px;
            }
            
            .boxes-container {
                max-width: 100%;
                gap: 6px;
                margin-bottom: 20px;
            }
            
            .box {
                padding: 8px 6px;
            }
            
            .box h4 {
                font-size: 7px;
            }
            
            .signup-box {
                position: relative;
                bottom: auto;
                left: auto;
                margin: 20px 0;
                max-width: 100%;
            }
            
            footer {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <img src="town-illustration.png" class="bg-image" alt="">
    
    <div class="container">
        <!-- 6 BOXES - POSTCARD LAYOUT -->
        <div class="boxes-container">
            <div class="box small">
                <div class="icon">📻</div>
                <h4>TLN Radio</h4>
                <p>Stream local jingles</p>
            </div>
            
            <div class="box small">
                <div class="icon">💡</div>
                <h4>Recommend</h4>
                <p>Suggest a business</p>
            </div>
            
            <div class="box small">
                <div class="icon">☕</div>
                <h4>Pillars</h4>
                <p>8 categories</p>
            </div>
            
            <div class="box medium highlight">
                <div class="icon">🍽️</div>
                <h4>Our Mission</h4>
                <p>Shop local. Feed families.</p>
            </div>
            
            <div class="box small">
                <div class="icon">🗺️</div>
                <h4>Coverage</h4>
                <p>Greater Waxhaw</p>
            </div>
            
            <div class="box small">
                <div class="icon">📣</div>
                <h4>Businesses</h4>
                <p>Advertise with us</p>
            </div>
        </div>
        
        <!-- EMAIL SIGNUP - BOTTOM LEFT -->
        <div class="signup-box">
            <h3>Want Local Deals?</h3>
            <form onsubmit="alert('Thanks! We\'ll notify you when we launch.'); return false;">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <!-- FOOTER -->
        <footer>
            <div class="logo">The Local NearBuy</div>
            <p>Shop local. Feed families.</p>
        </footer>
    </div>
</body>
</html>
