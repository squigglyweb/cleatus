<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local NearBuy — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { --red: #d32f2f; --black: #1a1a1a; }
        
        body { font-family: 'Inter', sans-serif; background: var(--black); }
        
        .bg-image { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        
        .container { position: relative; z-index: 1; min-height: 100vh; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* TOP ROW - 6 BUTTONS */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: white;
            border: 2px solid var(--black);
            border-radius: 6px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s;
        }
        
        .nav-btn:hover { transform: translateY(-2px); }
        .nav-btn .icon { font-size: 14px; }
        .nav-btn .label { font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .nav-btn.highlight { border-color: var(--red); background: rgba(211,47,47,0.08); }
        .nav-btn.highlight .label { color: var(--red); }
        
        /* EMAIL SIGNUP */
        .signup-box {
            background: rgba(255,255,255,0.97);
            padding: 18px 22px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            max-width: 280px;
        }
        
        .signup-box h3 { font-size: 13px; font-weight: 900; color: var(--red); margin-bottom: 10px; text-transform: uppercase; }
        .signup-box form { display: flex; flex-direction: column; gap: 6px; }
        .signup-box input { padding: 8px 10px; border: 2px solid #ddd; border-radius: 4px; font-size: 12px; }
        .signup-box button { background: var(--red); color: white; border: none; padding: 8px; border-radius: 4px; font-weight: 700; cursor: pointer; font-size: 12px; }
        
        footer { text-align: left; }
        footer .logo { font-size: 14px; font-weight: 900; color: var(--red); }
        footer p { color: rgba(255,255,255,0.4); font-size: 8px; margin-top: 2px; }
        
        @media (max-width: 768px) {
            .nav-row { gap: 5px; }
            .nav-btn { padding: 8px 10px; }
            .nav-btn .label { font-size: 8px; }
        }
    </style>
</head>
<body>
    <!-- THE ILLUSTRATION WITH 8 SECTIONS - AS THE BACKGROUND -->
    <img src="town-illustration.png" class="bg-image" alt="">
    
    <div class="container">
        <!-- TOP NAV -->
        <div class="nav-row">
            <button class="nav-btn"><span class="icon">📻</span><span class="label">TLN Radio</span></button>
            <button class="nav-btn"><span class="icon">💡</span><span class="label">Recommend</span></button>
            <button class="nav-btn"><span class="icon">☕</span><span class="label">Content Pillars</span></button>
            <button class="nav-btn highlight"><span class="icon">🍽️</span><span class="label">Our Mission</span></button>
            <button class="nav-btn"><span class="icon">🗺️</span><span class="label">Coverage</span></button>
            <button class="nav-btn"><span class="icon">📣</span><span class="label">Businesses</span></button>
        </div>
        
        <!-- EMAIL SIGNUP -->
        <div class="signup-box">
            <h3>Want Local Deals?</h3>
            <form onsubmit="alert('Thanks!'); return false;">
                <input type="email" placeholder="Your email" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <footer>
            <div class="logo">The Local NearBuy</div>
            <p>Shop local. Feed families.</p>
        </footer>
    </div>
</body>
</html>
