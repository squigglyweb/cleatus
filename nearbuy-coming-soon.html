<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local NearBuy — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #d32f2f;
            --black: #1a1a1a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
        }
        
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            padding: 30px;
        }
        
        /* TOP NAV - 6 BOXES IN A ROW */
        .top-nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .nav-box {
            background: white;
            border: 2px solid var(--black);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            min-width: 100px;
        }
        
        .nav-box:hover {
            transform: translateY(-3px);
        }
        
        .nav-box .icon {
            font-size: 16px;
        }
        
        .nav-box h4 {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }
        
        .nav-box .arrow {
            font-size: 10px;
            color: #999;
        }
        
        .nav-box.highlight {
            border-color: var(--red);
            background: rgba(211,47,47,0.05);
        }
        
        .nav-box.highlight h4 {
            color: var(--red);
        }
        
        /* EMAIL SIGNUP - BOTTOM LEFT */
        .signup-box {
            position: absolute;
            bottom: 60px;
            left: 30px;
            background: rgba(255,255,255,0.97);
            padding: 20px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            max-width: 300px;
        }
        
        .signup-box h3 {
            font-size: 14px;
            font-weight: 900;
            color: var(--red);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .signup-box form {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .signup-box input {
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
        }
        
        .signup-box button {
            background: var(--red);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        
        footer {
            position: absolute;
            bottom: 20px;
            left: 30px;
        }
        
        footer .logo {
            font-size: 16px;
            font-weight: 900;
            color: var(--red);
        }
        
        footer p {
            color: rgba(255,255,255,0.4);
            font-size: 9px;
            margin-top: 3px;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .top-nav {
                flex-wrap: wrap;
            }
            
            .nav-box {
                min-width: auto;
                padding: 10px 12px;
            }
            
            .signup-box {
                position: relative;
                bottom: auto;
                left: auto;
                margin: 20px 0;
                max-width: 100%;
            }
            
            footer {
                position: relative;
                bottom: auto;
                left: auto;
                margin-top: 30px;
            }
        }
    </style>
</head>
<body>
    <img src="town-illustration.png" class="bg-image" alt="">
    
    <div class="container">
        <!-- TOP NAV - 6 BOXES IN A ROW -->
        <div class="top-nav">
            <div class="nav-box">
                <span class="icon">📻</span>
                <h4>TLN Radio</h4>
                <span class="arrow">▾</span>
            </div>
            
            <div class="nav-box">
                <span class="icon">💡</span>
                <h4>Recommend</h4>
                <span class="arrow">▾</span>
            </div>
            
            <div class="nav-box highlight">
                <span class="icon">🍽️</span>
                <h4>Our Mission</h4>
                <span class="arrow">▾</span>
            </div>
            
            <div class="nav-box">
                <span class="icon">☕</span>
                <h4>Pillars</h4>
                <span class="arrow">▾</span>
            </div>
            
            <div class="nav-box">
                <span class="icon">🗺️</span>
                <h4>Coverage</h4>
                <span class="arrow">▾</span>
            </div>
            
            <div class="nav-box">
                <span class="icon">📣</span>
                <h4>Businesses</h4>
                <span class="arrow">▾</span>
            </div>
        </div>
        
        <!-- EMAIL SIGNUP - BOTTOM LEFT -->
        <div class="signup-box">
            <h3>Want Local Deals?</h3>
            <form onsubmit="alert('Thanks!'); return false;">
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <!-- FOOTER -->
        <footer>
            <div class="logo">The Local NearBuy</div>
            <p>Shop local. Feed families.</p>
        </footer>
    </div>
</body>
</html>
