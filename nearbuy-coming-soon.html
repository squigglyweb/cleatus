<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Local NearBuy — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --red: #d32f2f;
            --black: #1a1a1a;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
        }
        
        /* FULL BACKGROUND IMAGE */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        
        /* CONTENT CONTAINER */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
        }
        
        /* EMAIL SIGNUP - BOTTOM LEFT, OVER THE IMAGE */
        .signup-box {
            position: absolute;
            bottom: 80px;
            left: 40px;
            background: rgba(255,255,255,0.95);
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 350px;
        }
        
        .signup-box h3 {
            font-size: 18px;
            font-weight: 900;
            color: var(--red);
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .signup-box form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .signup-box input {
            padding: 12px 14px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .signup-box button {
            background: var(--red);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* FOOTER */
        footer {
            text-align: left;
        }
        
        footer .logo {
            font-size: 20px;
            font-weight: 900;
            color: var(--red);
        }
        
        footer p {
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            margin-top: 5px;
        }
        
        /* MOBILE */
        @media (max-width: 768px) {
            .signup-box {
                position: relative;
                bottom: auto;
                left: auto;
                margin: 20px;
                max-width: calc(100% - 40px);
            }
            
            .container {
                padding: 20px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- BACKGROUND IMAGE -->
    <img src="town-illustration.png" class="bg-image" alt="">
    
    <!-- CONTENT -->
    <div class="container">
        <!-- Empty - logo IS in the image -->
        
        <!-- EMAIL SIGNUP - BOTTOM LEFT, OVER IMAGE -->
        <div class="signup-box">
            <h3>Want Local Deals?</h3>
            <form onsubmit="alert('Thanks! We\'ll notify you when we launch.'); return false;">
                <input type="email" placeholder="Enter your email address" required>
                <button type="submit">Notify Me</button>
            </form>
        </div>
        
        <!-- FOOTER -->
        <footer>
            <div class="logo">The Local NearBuy</div>
            <p>Shop local. Feed families.</p>
        </footer>
    </div>
</body>
</html>
