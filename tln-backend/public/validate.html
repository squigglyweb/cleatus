<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validate Offer | The Local NearBuy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: white; min-height: 100vh; padding: 1rem; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.3rem; margin-bottom: 1rem; }
        .scanner-btn { width: 100%; background: #e63946; color: white; border: none; padding: 1.2rem; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-bottom: 1rem; }
        .divider { text-align: center; color: #666; margin: 1rem 0; }
        input { width: 100%; padding: 1rem; border: none; border-radius: 8px; font-size: 1.1rem; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }
        
        .result { display: none; padding: 1.5rem; border-radius: 12px; text-align: center; margin-top: 1rem; }
        .result.valid { background: #22c55e; }
        .result.invalid { background: #dc2626; }
        .result h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .result p { font-size: 1rem; }
        
        .offer-details { background: rgba(255,255,255,0.1); padding: 1rem; border-radius: 8px; margin: 1rem 0; text-align: left; }
        .offer-details div { margin: 0.3rem 0; }
        
        .redeem-btn { width: 100%; background: white; color: #1a1a1a; border: none; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .meals-badge { display: inline-block; background: white; color: #22c55e; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: 600; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Validate Offer</h1>
        
        <button class="scanner-btn" onclick="alert('Camera scanner coming soon! Enter code manually for now.')">
            📷 Scan QR Code
        </button>
        
        <div class="divider">— or enter code manually —</div>
        
        <input type="text" id="codeInput" placeholder="A1B2C3D4" maxlength="8">
        
        <div id="result" class="result">
            <!-- Results show here -->
        </div>
        
        <button class="redeem-btn" id="redeemBtn" style="display:none;" onclick="redeemCode()">
            ✅ Mark as Redeemed
        </button>
    </div>

    <script>
        let currentCode = '';
        
        document.getElementById('codeInput').addEventListener('input', async (e) => {
            currentCode = e.target.value.toUpperCase();
            if (currentCode.length >= 6) {
                await checkCode();
            }
        });
        
        async function checkCode() {
            const resultDiv = document.getElementById('result');
            const redeemBtn = document.getElementById('redeemBtn');
            
            const response = await fetch(`/api/validate/${currentCode}`);
            const data = await response.json();
            
            resultDiv.style.display = 'block';
            
            if (data.valid) {
                resultDiv.className = 'result valid';
                resultDiv.innerHTML = `
                    <h2>✅ Valid Offer</h2>
                    <p>${data.offer_title}</p>
                    <div class="offer-details">
                        <div><strong>Customer:</strong> ${data.customer_name}</div>
                        <div><strong>Business:</strong> ${data.business_name}</div>
                    </div>
                    <div class="meals-badge">❤️ Feeds ${data.meals_per_redemption} meals</div>
                `;
                redeemBtn.style.display = 'block';
            } else {
                resultDiv.className = 'result invalid';
                resultDiv.innerHTML = `
                    <h2>❌ ${data.message}</h2>
                    <p>This offer cannot be redeemed.</p>
                `;
                redeemBtn.style.display = 'none';
            }
        }
        
        async function redeemCode() {
            const response = await fetch('/api/redeem', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: currentCode })
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert('🎉 Offer redeemed! Thank you.');
                document.getElementById('codeInput').value = '';
                document.getElementById('result').style.display = 'none';
                document.getElementById('redeemBtn').style.display = 'none';
            } else {
                alert('Error: ' + data.message);
            }
        }
    </script>
</body>
</html>
