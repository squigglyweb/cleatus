<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Offer | The Local NearBuy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 400px; width: 100%; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #1a1a1a; }
        p { color: #666; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { width: 100%; background: #e63946; color: white; border: none; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #c1121f; }
        .success { display: none; }
        .success img { max-width: 200px; margin: 1rem 0; }
        .code-display { background: #f0f0f0; padding: 1rem; border-radius: 8px; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; margin: 1rem 0; }
        .success-note { background: #e8f5e9; padding: 1rem; border-radius: 8px; color: #2e7d32; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card" id="formCard">
        <h1>🎉 Claim Your Offer</h1>
        <p>Enter your details to unlock this offer.</p>
        <form id="claimForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <button type="submit">Claim Offer</button>
        </form>
        <p style="font-size: 0.8rem; margin-top: 1rem;">A portion of this offer helps feed local families! 🍽️</p>
    </div>
    
    <div class="card success" id="successCard">
        <h1>🎉 You're In!</h1>
        <p>Here's your unique code:</p>
        <div class="code-display" id="codeDisplay"></div>
        <img id="qrImage" src="" alt="QR Code">
        <p>Show this to the staff when you visit.</p>
        <div class="success-note">
            ❤️ Thanks for supporting local! This redemption funds meals for local families.
        </div>
    </div>

    <script>
        const offerId = window.location.pathname.split('/').pop();
        
        document.getElementById('claimForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            const response = await fetch('/api/claim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ offer_id: offerId, customer_name: name, customer_email: email })
            });
            
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('formCard').style.display = 'none';
                document.getElementById('successCard').style.display = 'block';
                document.getElementById('codeDisplay').textContent = data.unique_code;
                document.getElementById('qrImage').src = data.qr_code;
            } else {
                alert('Error: ' + data.message);
            }
        });
    </script>
</body>
</html>
