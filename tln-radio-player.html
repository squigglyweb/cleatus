<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLN Radio Player</title>
<style>
    .radio-player {
        background: linear-gradient(145deg, #1a1a1a, #2d2d2d);
        border-radius: 12px;
        padding: 20px;
        width: 280px;
        font-family: 'Segoe UI', sans-serif;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    
    .radio-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
    }
    
    .live-light {
        width: 10px;
        height: 10px;
        background: #ff0000;
        border-radius: 50%;
        box-shadow: 0 0 8px #ff0000, 0 0 16px #ff0000;
        animation: blink 1.5s ease-in-out infinite;
    }
    
    @keyframes blink {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px #ff0000, 0 0 16px #ff0000; }
        50% { opacity: 0.5; box-shadow: 0 0 4px #ff0000; }
    }
    
    .live-label { color: #ff0000; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .station-name { color: #fff; font-size: 14px; font-weight: 600; margin-left: auto; }
    .now-playing { background: #111; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #333; }
    .now-playing-label { color: #888; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .song-title { color: #fff; font-size: 13px; font-weight: 500; }
    .artist { color: #aaa; font-size: 11px; }
    .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
    .control-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: #333; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .control-btn:hover { background: #444; transform: scale(1.05); }
    .control-btn.play { background: #ff0000; width: 50px; height: 50px; }
    .control-btn.play:hover { background: #ff3333; }
    .progress-container { margin-bottom: 15px; }
    .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; cursor: pointer; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ff0000, #ff4444); border-radius: 2px; position: relative; transition: width 0.1s; }
    .progress-fill::after { content: ''; position: absolute; right: -6px; top: -3px; width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
    .time-display { display: flex; justify-content: space-between; color: #888; font-size: 10px; margin-top: 5px; }
    .volume-container { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    .volume-icon { color: #888; font-size: 12px; }
    .volume-slider { flex: 1; height: 4px; -webkit-appearance: none; background: #333; border-radius: 2px; outline: none; }
    .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: #fff; border-radius: 50%; cursor: pointer; }
    .track-list { background: #111; border-radius: 8px; padding: 8px; max-height: 150px; overflow-y: auto; }
    .track { padding: 8px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
    .track:hover { background: #222; }
    .track.active { background: #330000; }
    .track-num { color: #666; font-size: 10px; width: 16px; }
    .track-name { color: #fff; font-size: 11px; flex: 1; }
    .track.active .track-name { color: #ff0000; }
</style>
</head>
<body>

<div class="radio-player">
    <div class="radio-header">
        <div class="live-light"></div>
        <span class="live-label">LIVE</span>
        <span class="station-name">TLN RADIO</span>
    </div>
    
    <div class="now-playing">
        <div class="now-playing-label">Now Playing</div>
        <div class="song-title" id="songTitle">Select a track</div>
        <div class="artist">The Local NearBuy</div>
    </div>
    
    <div class="controls">
        <button class="control-btn" id="prevBtn">⏮</button>
        <button class="control-btn play" id="playBtn">▶</button>
        <button class="control-btn" id="nextBtn">⏭</button>
    </div>
    
    <div class="progress-container">
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>
    
    <div class="volume-container">
        <span class="volume-icon">🔊</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.7">
    </div>
    
    <div class="track-list" id="trackList"></div>
</div>

<audio id="audioPlayer"></audio>

<script>
    const tracks = [
        { name: "Where To Buy Nearby", file: "Where-To-Buy-Nearby-Bkgd.mp3" },
        { name: "TLN Jingle 2", file: "TLN-2.mp3" },
        { name: "TLN Jingle 3", file: "TLN-3.mp3" },
        { name: "TLNB 1", file: "TLNB-1.mp3" },
        { name: "TLNB 3", file: "TLNB-3.mp3" },
        { name: "TLNB v3 2", file: "TLNB-v3-2.mp3" },
        { name: "TLNB v3 3", file: "TLNB-v3-3.mp3" },
        { name: "TLNB v3 4", file: "TLNB-v3-4.mp3" },
        { name: "TLNB v3 5", file: "TLNB-v3-5.mp3" },
        { name: "TLNB v3", file: "TLNB-v3.mp3" }
    ];
    
    const baseUrl = "https://thelocalnearbuy.com/wp-content/uploads/2026/04/";
    
    let currentTrack = 0;
    let isPlaying = false;
    
    const audio = document.getElementById('audioPlayer');
    const playBtn = document.getElementById('playBtn');
    const songTitle = document.getElementById('songTitle');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const trackList = document.getElementById('trackList');
    const volumeSlider = document.getElementById('volumeSlider');
    
    tracks.forEach((track, index) => {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerHTML = `<span class="track-num">${index + 1}</span><span class="track-name">${track.name}</span>`;
        div.onclick = () => loadTrack(index);
        trackList.appendChild(div);
    });
    
    function loadTrack(index) {
        currentTrack = index;
        audio.src = baseUrl + tracks[index].file;
        songTitle.textContent = tracks[index].name;
        
        document.querySelectorAll('.track').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
        
        if (isPlaying) audio.play();
    }
    
    playBtn.addEventListener('click', () => {
        if (!audio.src) { loadTrack(0); }
        
        if (isPlaying) {
            audio.pause();
            playBtn.textContent = '▶';
        } else {
            audio.play();
            playBtn.textContent = '⏸';
        }
        isPlaying = !isPlaying;
    });
    
    document.getElementById('prevBtn').addEventListener('click', () => {
        currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
        loadTrack(currentTrack);
        if (isPlaying) audio.play();
    });
    
    document.getElementById('nextBtn').addEventListener('click', () => {
        currentTrack = (currentTrack + 1) % tracks.length;
        loadTrack(currentTrack);
        if (isPlaying) audio.play();
    });
    
    audio.addEventListener('timeupdate', () => {
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = percent + '%';
        currentTimeEl.textContent = formatTime(audio.currentTime);
    });
    
    audio.addEventListener('loadedmetadata', () => {
        totalTimeEl.textContent = formatTime(audio.duration);
    });
    
    audio.addEventListener('ended', () => {
        currentTrack = (currentTrack + 1) % tracks.length;
        loadTrack(currentTrack);
        audio.play();
    });
    
    document.getElementById('progressBar').addEventListener('click', (e) => {
        const rect = e.target.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        audio.currentTime = percent * audio.duration;
    });
    
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });
    
    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return mins + ':' + (secs < 10 ? '0' : '') + secs;
    }
    
    audio.volume = 0.7;
</script>

</body>
</html>
